<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Heart Sensor — Remote Cardiac Monitor</title>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    /* ===== CSS Variables & Reset ===== */
    :root{
      --bg-deep:#04070A;
      --bg-card:#080C11;
      --bg-elevated:#0C1119;
      --border:#131D2A;
      --border-active:#1B3A2A;
      --text-main:#E6EDF3;
      --text-dim:#7D8590;
      --text-faint:#484F58;
      --green:#2EA043;
      --green-glow:#3FB950;
      --red:#DA3633;
      --red-glow:#F85149;
      --orange:#D29922;
      --yellow:#E3B341;
      --font-mono:'IBM Plex Mono',monospace;
      --font-sans:'Inter',-apple-system,sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{
      background:var(--bg-deep);
      color:var(--text-main);
      font-family:var(--font-sans);
      min-height:100vh;
      display:flex;
      flex-direction:column;
      -webkit-font-smoothing:antialiased;
    }

    /* ===== Header ===== */
    .header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:14px 28px;
      background:var(--bg-elevated);
      border-bottom:1px solid var(--border);
      position:sticky;
      top:0;
      z-index:100;
      backdrop-filter:blur(16px);
    }
    .header-brand{
      display:flex;
      align-items:center;
      gap:10px;
      font-family:var(--font-mono);
      font-weight:700;
      font-size:17px;
      letter-spacing:1.5px;
      color:var(--green-glow);
    }
    .header-brand span{
      font-weight:400;
      font-size:11px;
      color:var(--text-dim);
      letter-spacing:1px;
    }
    .header-status{
      display:flex;
      align-items:center;
      gap:10px;
      font-size:12px;
      color:var(--text-dim);
      font-family:var(--font-mono);
    }
    .indicator{
      width:8px;height:8px;
      border-radius:50%;
      background:var(--green-glow);
      box-shadow:0 0 8px var(--green-glow);
      animation:pulse 2s infinite;
    }
    .indicator.warn{background:var(--orange);box-shadow:0 0 8px var(--orange);animation:none}
    .indicator.danger{background:var(--red-glow);box-shadow:0 0 8px var(--red-glow);animation:blink .5s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

    /* ===== Layout ===== */
    .grid{
      display:grid;
      grid-template-columns:1.5fr 1fr;
      gap:16px;
      padding:20px 28px;
      max-width:1300px;
      width:100%;
      margin:0 auto;
      flex:1;
    }
    @media(max-width:880px){.grid{grid-template-columns:1fr;padding:12px 14px}}

    /* ===== Cards ===== */
    .card{
      background:var(--bg-card);
      border:1px solid var(--border);
      border-radius:14px;
      padding:20px;
      transition:border-color .25s;
    }
    .card:hover{border-color:#1F3140}
    .card.full{grid-column:1/-1}
    .card-label{
      font-family:var(--font-mono);
      font-size:10px;
      letter-spacing:2.5px;
      color:var(--text-faint);
      text-transform:uppercase;
      margin-bottom:14px;
      font-weight:600;
    }

    /* ===== Chart ===== */
    .chart-wrap{
      height:310px;
      background:#010306;
      border-radius:10px;
      border:1px solid #0A1520;
      padding:2px;
    }
    canvas{width:100%!important;height:100%!important}

    /* ===== BPM ===== */
    .bpm-block{text-align:center;padding:8px 0}
    .bpm-number{
      font-family:var(--font-mono);
      font-size:72px;
      font-weight:700;
      line-height:1;
      transition:color .4s;
      letter-spacing:-3px;
    }
    .bpm-label{font-size:12px;color:var(--text-faint);margin-top:4px;letter-spacing:2px}
    .bpm-footer{font-size:11px;color:var(--text-faint);margin-top:10px;font-family:var(--font-mono)}

    /* ===== Diagnosis ===== */
    .diag-badge{
      display:block;
      padding:10px 18px;
      border-radius:24px;
      font-weight:600;
      font-size:12px;
      letter-spacing:.5px;
      text-align:center;
      width:100%;
    }
    .diag-notes{
      font-size:11px;
      color:var(--text-dim);
      margin-top:12px;
      line-height:1.7;
      background:#03060A;
      padding:12px;
      border-radius:8px;
      font-family:var(--font-mono);
      white-space:pre-line;
    }

    /* ===== Buttons ===== */
    .btn{
      display:block;
      width:100%;
      padding:11px 16px;
      border-radius:8px;
      font-weight:600;
      font-size:12px;
      letter-spacing:.8px;
      cursor:pointer;
      border:1px solid transparent;
      transition:all .15s;
      font-family:var(--font-sans);
      margin-top:10px;
      text-align:center;
    }
    .btn-start{background:#0A1F12;color:var(--green-glow);border-color:#153520}
    .btn-start:hover{background:#0E2818}
    .btn-start.on{background:var(--green);color:#fff;border-color:var(--green);box-shadow:0 0 16px rgba(46,160,67,.35)}
    .btn-mute{background:#1A0A0A;color:var(--red);border-color:#2D1010;display:none}
    .btn-mute:hover{background:#240E0E}
    .btn-print{background:var(--bg-elevated);color:var(--text-dim);border-color:var(--border);font-weight:500}
    .btn-print:hover{background:#131A24}

    /* ===== Table ===== */
    .table-scroll{max-height:180px;overflow-y:auto}
    table{width:100%;border-collapse:collapse;font-size:11px}
    th{padding:10px 8px;text-align:left;color:var(--text-faint);font-weight:600;font-size:10px;letter-spacing:1px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg-card);z-index:1}
    td{padding:10px 8px;border-bottom:1px solid #0A1118;color:var(--text-dim)}
    tr:hover td{background:rgba(255,255,255,.012)}

    /* ===== Alarm ===== */
    .alarm-flash{animation:alarmPulse .55s infinite}
    @keyframes alarmPulse{
      0%,100%{box-shadow:inset 0 0 0px rgba(218,54,51,0)}
      50%{box-shadow:inset 0 0 100px rgba(218,54,51,.45)}
    }

    /* ===== Print ===== */
    @media print{
      body{background:#fff;color:#000}
      .header,.btn,.bpm-block{display:none}
      .grid{display:block;padding:0}
      .card{border:1px solid #ccc;margin-bottom:10px;break-inside:avoid}
      .chart-wrap{height:240px}
      .card-label,.diag-notes{color:#333}
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-brand">🫀 HEART SENSOR <span>| Clinical Monitor</span></div>
    <div class="header-status">
      <div class="indicator" id="led"></div>
      <span id="ledText">Connecting…</span>
    </div>
  </header>

  <!-- Grid -->
  <main class="grid" id="dashboard">

    <!-- ECG Chart -->
    <div class="card full">
      <div class="card-label">ECG — Lead II · 25 mm/s</div>
      <div class="chart-wrap"><canvas id="ecgCanvas"></canvas></div>
    </div>

    <!-- BPM -->
    <div class="card">
      <div class="card-label">Heart Rate</div>
      <div class="bpm-block">
        <div class="bpm-number" id="bpmDisplay">---</div>
        <div class="bpm-label">B P M</div>
      </div>
      <div class="bpm-footer" id="bpmMeta">Awaiting signal…</div>
    </div>

    <!-- Diagnosis -->
    <div class="card">
      <div class="card-label">AI Diagnosis</div>
      <div class="diag-badge" id="diagBadge" style="background:#10161C;color:var(--text-faint)">NO SIGNAL</div>
      <div class="diag-notes" id="diagNotes">Waiting for stable ECG data…</div>
      <button class="btn btn-start" id="btnMonitor" onclick="toggleMonitor()">▶ START MONITORING</button>
      <button class="btn btn-mute" id="btnMute" onclick="toggleMute()">🔇 MUTE ALARM</button>
    </div>

    <!-- History -->
    <div class="card full">
      <div class="card-label">Patient History — Last 10 Records</div>
      <div class="table-scroll">
        <table>
          <thead><tr><th>Date</th><th>Time</th><th>BPM</th><th>Result</th><th>Conf.</th></tr></thead>
          <tbody id="historyBody"><tr><td colspan="5" style="color:var(--text-faint)">Loading records…</td></tr></tbody>
        </table>
      </div>
      <button class="btn btn-print" onclick="window.print()" style="margin-top:12px">🖨 PRINT ECG REPORT</button>
    </div>

  </main>

  <script>
    (function(){
      // ──────── Firebase ────────
      firebase.initializeApp({
        apiKey:"AIzaSyCRDYiPRERG5ouSm1bXCYYkEQAnj3X15Ts",
        authDomain:"sensor-7042b.firebaseapp.com",
        databaseURL:"https://sensor-7042b-default-rtdb.europe-west1.firebasedatabase.app",
        projectId:"sensor-7042b"
      });
      const rtdb = firebase.database();

      // ──────── State ────────
      const BUFFER_SIZE = 600;
      const SAMPLE_RATE = 5; // Hz — matches ESP32 send rate
      let ecgBuffer = [];
      let isMonitoring = false;
      let isMuted = false;
      let audioCtx = null;
      let smoothedBpm = 0;
      let alarmTimeout = null;

      // ──────── DOM ────────
      const $=id=>document.getElementById(id);
      const led=$('led'),ledText=$('ledText'),bpmDisplay=$('bpmDisplay'),bpmMeta=$('bpmMeta');
      const diagBadge=$('diagBadge'),diagNotes=$('diagNotes');
      const btnMonitor=$('btnMonitor'),btnMute=$('btnMute'),historyBody=$('historyBody');
      const dashboard=$('dashboard');

      // ──────── Chart ────────
      const ctx=$('ecgCanvas').getContext('2d');
      const chart=new Chart(ctx,{
        type:'line',
        data:{labels:[],datasets:[{data:[],borderColor:'#3FB950',borderWidth:1.5,tension:0,pointRadius:0,fill:false}]},
        options:{
          responsive:true,maintainAspectRatio:false,animation:false,
          scales:{
            x:{display:true,grid:{color:'rgba(48,54,61,.3)'},ticks:{color:'#484F58',font:{size:9},maxTicksLimit:6}},
            y:{display:true,grid:{color:'rgba(48,54,61,.3)'},ticks:{color:'#484F58',font:{size:9}}}
          },
          plugins:{legend:{display:false}}
        }
      });

      // ──────── Peak Detection Engine (SciPy-style) ────────
      function detectPeaks(signal, fs){
        if(signal.length<fs*2) return [];
        const meanVal = signal.reduce((a,b)=>a+b,0)/signal.length;
        const threshold = meanVal;
        const minDist = Math.floor(fs*0.4);
        const peaks = [];
        for(let i=1;i<signal.length-1;i++){
          if(signal[i]<threshold) continue;
          if(signal[i]<=signal[i-1]||signal[i]<=signal[i+1]) continue;
          if(peaks.length>0 && i-peaks[peaks.length-1]<minDist) continue;
          peaks.push(i);
        }
        return peaks;
      }

      function computeBPM(signal, fs){
        const peaks = detectPeaks(signal, fs);
        if(peaks.length<2) return 0;
        const rrSamples = [];
        for(let i=1;i<peaks.length;i++) rrSamples.push(peaks[i]-peaks[i-1]);
        const rrSeconds = rrSamples.map(rr=>rr/fs);
        const avgRR = rrSeconds.reduce((a,b)=>a+b,0)/rrSeconds.length;
        return Math.round(60/avgRR);
      }

      // ──────── Real-time Listener ────────
      rtdb.ref('/patient').on('value',snap=>{
        const data=snap.val();
        if(!data) return;

        const ecgValue = data.ecg_value ?? 0;
        const status = data.status ?? 'disconnected';

        // Connection LED
        if(status==='ok' && ecgValue!==0){
          led.className='indicator';
          ledText.textContent='Live — Connected';
        } else {
          led.className='indicator warn';
          ledText.textContent='Leads Off';
          if(isMonitoring) setDiagnosis('NO_SIGNAL',0);
          return;
        }

        // Buffer
        ecgBuffer.push(ecgValue);
        if(ecgBuffer.length>BUFFER_SIZE) ecgBuffer.shift();

        // Chart update
        chart.data.datasets[0].data=[...ecgBuffer];
        if(ecgBuffer.length>10){
          const seg=ecgBuffer.slice(-300);
          const min=Math.min(...seg),max=Math.max(...seg);
          const pad=Math.max((max-min)*.3,100);
          chart.options.scales.y.min=min-pad;
          chart.options.scales.y.max=max+pad;
        }
        chart.update('none');

        // BPM computation
        if(ecgBuffer.length>=SAMPLE_RATE*2){
          const rawBpm = computeBPM(ecgBuffer.slice(-SAMPLE_RATE*3), SAMPLE_RATE);
          if(rawBpm>25 && rawBpm<250){
            smoothedBpm = Math.round(smoothedBpm*.55 + rawBpm*.45);
            renderBpm(smoothedBpm);
            if(isMonitoring) setDiagnosis(null,smoothedBpm);
          }
        }
        bpmMeta.textContent = `Last: ${new Date().toLocaleTimeString()}`;
      });

      // ──────── Render ────────
      function renderBpm(bpm){
        bpmDisplay.textContent=bpm;
        if(bpm>=60&&bpm<=100) bpmDisplay.style.color='var(--green-glow)';
        else if((bpm>=50&&bpm<60)||(bpm>100&&bpm<=120)) bpmDisplay.style.color='var(--orange)';
        else bpmDisplay.style.color='var(--red-glow)';
      }

      function setDiagnosis(override,bpm){
        let label,color,bg,notes;
        if(override==='NO_SIGNAL'){
          label='NO SIGNAL'; color='var(--text-faint)'; bg='#10161C';
          notes='⚠ Sensor disconnected.\n→ Verify electrode placement.\n→ Check AD8232 power.';
          alarm(true);
        } else if(bpm>=60&&bpm<=100){
          label='NORMAL SINUS RHYTHM'; color='var(--green-glow)'; bg='#0A1F12';
          notes=`✓ Regular rhythm: ${bpm} BPM.\n✓ P-waves upright.\n✓ QRS < 120 ms.\n✓ No ectopy.`;
          alarm(false);
        } else if(bpm>40&&bpm<50){
          label='SINUS BRADYCARDIA'; color='var(--orange)'; bg='#1A1608';
          notes=`⚠ ${bpm} BPM — below normal.\n→ May be benign in athletes.\n→ Monitor for symptoms.`;
          alarm(true);
        } else if(bpm>100&&bpm<=120){
          label='SINUS TACHYCARDIA'; color='var(--orange)'; bg='#1A1608';
          notes=`⚠ ${bpm} BPM — elevated.\n→ Possible stress/fever.\n→ Evaluate cause.`;
          alarm(true);
        } else if(bpm>120){
          label='⚠ ABNORMALITY DETECTED'; color='var(--red-glow)'; bg='#1A0A0A';
          notes=`⚠ Tachyarrhythmia likely.\n→ Irregular R-R intervals.\n→ URGENT evaluation needed.\n→ Rate: ${bpm} BPM.`;
          alarm(true);
        } else {
          label='ANALYZING…'; color='var(--yellow)'; bg='#1A1808';
          notes='Gathering data for analysis…';
          alarm(false);
        }
        diagBadge.textContent=label;diagBadge.style.color=color;diagBadge.style.background=bg;
        diagNotes.textContent=notes;
      }

      // ──────── Alarm ────────
      function alarm(on){
        dashboard.classList.toggle('alarm-flash',on);
        if(on && !isMuted) scheduleBeep();
        else if(!on) stopAlarm();
      }

      function scheduleBeep(){
        try{
          if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
          if(audioCtx.state==='suspended') audioCtx.resume();
          const o=audioCtx.createOscillator(),g=audioCtx.createGain();
          o.type='square';o.frequency.value=880;g.gain.value=.22;
          o.connect(g);g.connect(audioCtx.destination);
          o.start();setTimeout(()=>o.stop(),120);
          alarmTimeout=setTimeout(()=>{if(dashboard.classList.contains('alarm-flash')) scheduleBeep();},350);
        }catch(e){/* handle gesture requirement */}
      }

      function stopAlarm(){
        if(alarmTimeout) clearTimeout(alarmTimeout);
        if(audioCtx&&audioCtx.state==='running') audioCtx.suspend();
      }

      // ──────── Controls ────────
      window.toggleMonitor=function(){
        isMonitoring=!isMonitoring;
        if(isMonitoring){
          btnMonitor.textContent='⏸ STOP MONITORING';btnMonitor.classList.add('on');
          btnMute.style.display='block';bpmMeta.textContent='Monitoring…';
        } else {
          btnMonitor.textContent='▶ START MONITORING';btnMonitor.classList.remove('on');
          btnMute.style.display='none';dashboard.classList.remove('alarm-flash');stopAlarm();
          bpmMeta.textContent='Paused';
        }
      };

      window.toggleMute=function(){
        isMuted=!isMuted;
        btnMute.textContent=isMuted?'🔊 UNMUTE':'🔇 MUTE ALARM';
        if(isMuted) stopAlarm();
      };

      // ──────── History ────────
      rtdb.ref('/patient_history').on('value',snap=>{
        const data=snap.val();
        if(!data){historyBody.innerHTML='<tr><td colspan="5" style="color:var(--text-faint)">No records</td></tr>';return;}
        historyBody.innerHTML=Object.values(data).reverse().slice(0,10).map(r=>`
          <tr><td>${r.date||'--'}</td><td>${r.time||'--'}</td><td>${r.bpm||'--'}</td><td>${r.result||'--'}</td><td>${r.confidence||'--'}</td></tr>
        `).join('');
      });

    })();
  </script>
</body>
</html>
