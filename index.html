<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مراقبة القلب - Heart Sensor</title>
    
    <!-- Firebase SDK (compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0e17;
            color: #e0e0e0;
            direction: rtl;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 1000px;
            margin: auto;
        }
        h1 {
            text-align: center;
            color: #00d4ff;
            margin-bottom: 5px;
            font-size: 2.2em;
        }
        .subtitle {
            text-align: center;
            color: #aaa;
            margin-bottom: 20px;
        }
        .panel {
            background: #121a24;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }
        .row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }
        .bpm-box {
            background: #1a2634;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            min-width: 150px;
        }
        .bpm-label { font-size: 1em; color: #888; }
        .bpm-value { font-size: 4em; font-weight: bold; color: #00ff88; margin: 10px 0; }
        .status-box {
            background: #1a2634;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            min-width: 150px;
        }
        .status-indicator {
            width: 20px; height: 20px; border-radius: 50%; display: inline-block;
            margin-left: 8px; vertical-align: middle;
        }
        .connected { background: #00ff88; }
        .disconnected { background: #ff4d4d; }
        .canvas-container {
            background: #000;
            border-radius: 12px;
            padding: 10px;
            position: relative;
        }
        canvas {
            width: 100%;
            height: 250px;
            display: block;
            border-radius: 8px;
        }
        .ecg-speed {
            position: absolute;
            bottom: 15px;
            left: 20px;
            color: #aaa;
            font-size: 0.8em;
        }
        .buttons {
            display: flex;
            gap: 15px;
            margin-top: 15px;
            justify-content: center;
        }
        button {
            background: #00d4ff;
            color: #000;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        button:hover { background: #00b4d8; transform: scale(1.02); }
        button:active { transform: scale(0.98); }
        .table-container {
            max-height: 300px;
            overflow-y: auto;
            margin-top: 15px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 10px;
            border-bottom: 1px solid #2a3644;
            text-align: center;
        }
        th { background: #1a2634; color: #00d4ff; }
        .no-data { text-align: center; color: #666; padding: 30px; }
        @media print {
            button, .table-container, .subtitle, .no-print { display: none; }
            .canvas-container { box-shadow: none; }
            body { background: white; color: black; }
            .bpm-value { color: black; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🫀 مراقبة نبض القلب</h1>
        <p class="subtitle" id="connectionStatus">جاري الاتصال بقاعدة البيانات...</p>
        
        <div class="panel">
            <div class="row">
                <div class="bpm-box">
                    <div class="bpm-label">معدل النبض</div>
                    <div class="bpm-value" id="bpmDisplay">--</div>
                    <div>نبضة/دقيقة</div>
                </div>
                <div class="status-box">
                    <div>حالة الإشارة</div>
                    <h2 id="signalStatus">
                        <span class="status-indicator" id="statusDot"></span>
                        <span id="statusText">--</span>
                    </h2>
                </div>
            </div>
        </div>

        <div class="panel">
            <div class="canvas-container">
                <canvas id="ecgCanvas"></canvas>
                <div class="ecg-speed">25 mm/s</div>
            </div>
            <div class="buttons no-print">
                <button onclick="window.print()">🖨️ طباعة / حفظ PDF</button>
                <button onclick="downloadCSV()">💾 حفظ البيانات (CSV)</button>
            </div>
        </div>

        <div class="panel">
            <h3 style="margin-bottom:15px;">📋 سجل القياسات</h3>
            <div class="table-container" id="tableContainer">
                <table>
                    <thead>
                        <tr><th>التاريخ</th><th>الوقت</th><th>النبض</th><th>النتيجة</th><th>الثقة</th></tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr class="no-data"><td colspan="5">لا توجد سجلات</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // ========== إعدادات Firebase (متطابقة مع كود ESP32) ==========
        const firebaseConfig = {
            apiKey: "AIzaSyCRDYiPRERG5ouSm1bXCYYkEQAnj3X15Ts",
            databaseURL: "https://sensor-7042b-default-rtdb.europe-west1.firebasedatabase.app"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // ========== المتغيرات العامة ==========
        const ecgCanvas = document.getElementById('ecgCanvas');
        const ctx = ecgCanvas.getContext('2d');
        const bpmDisplay = document.getElementById('bpmDisplay');
        const signalStatus = document.getElementById('statusText');
        const statusDot = document.getElementById('statusDot');
        const connectionStatus = document.getElementById('connectionStatus');
        const tableBody = document.getElementById('tableBody');

        // مصفوفة لتخزين آخر 200 قيمة للإشارة (الرسم)
        const MAX_POINTS = 200;
        let ecgData = [];

        // متغيرات الرسم
        let width, height;
        function resizeCanvas() {
            const container = ecgCanvas.parentElement;
            ecgCanvas.width = container.clientWidth - 20;
            ecgCanvas.height = 250;
            width = ecgCanvas.width;
            height = ecgCanvas.height;
        }
        window.addEventListener('resize', () => {
            resizeCanvas();
            drawChart();
        });
        resizeCanvas();

        // متغيرات معالجة البيانات
        let lastEcg = 0;
        let currentBpm = 0;
        let isConnected = false;

        // سجل محلي لحفظ البيانات (للجدول والتصدير)
        let localRecords = [];

        // ========== دالة الرسم على Canvas ==========
        function drawChart() {
            ctx.clearRect(0, 0, width, height);

            // رسم شبكة
            ctx.strokeStyle = '#1a3a2a';
            ctx.lineWidth = 0.5;
            const gridRows = 5;
            for (let i = 0; i <= gridRows; i++) {
                const y = (height / gridRows) * i;
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(width, y);
                ctx.stroke();
            }
            const gridCols = 10;
            for (let i = 0; i <= gridCols; i++) {
                const x = (width / gridCols) * i;
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, height);
                ctx.stroke();
            }

            if (ecgData.length < 2) return;

            // حساب الحدود (مع هوامش)
            let minVal = Math.min(...ecgData);
            let maxVal = Math.max(...ecgData);
            if (maxVal - minVal < 100) { maxVal += 50; minVal -= 50; }
            const range = maxVal - minVal || 1;
            const scaleY = height / range;
            const offsetY = minVal;

            // رسم الخط
            ctx.strokeStyle = '#00ff88';
            ctx.lineWidth = 2.5;
            ctx.shadowColor = '#00ff88';
            ctx.shadowBlur = 6;
            ctx.beginPath();

            const stepX = width / (MAX_POINTS - 1);
            ecgData.forEach((value, index) => {
                const x = index * stepX;
                const y = height - (value - offsetY) * scaleY;
                if (index === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            });

            ctx.stroke();
            ctx.shadowBlur = 0; // إلغاء التوهج بعد الرسم
        }

        // ========== تحديث واجهة المستخدم ==========
        function updateUI(ecg, bpm, status) {
            // تحديث BPM
            currentBpm = bpm;
            bpmDisplay.textContent = bpm ? bpm : '--';

            // تحديث الحالة
            isConnected = (status === 'connected');
            signalStatus.textContent = isConnected ? 'موصول' : 'مفصول';
            statusDot.className = 'status-indicator ' + (isConnected ? 'connected' : 'disconnected');

            // إضافة إلى بيانات الرسم
            if (ecg !== undefined && ecg !== null) {
                ecgData.push(ecg);
                if (ecgData.length > MAX_POINTS) ecgData.shift();
                lastEcg = ecg;
            }

            drawChart();

            // تحديث السجل (كل 10 نقاط أو عند تغير النبض)
            if (ecgData.length % 10 === 0 || bpm !== currentBpm) {
                addRecord(bpm, status);
            }
        }

        // ========== إضافة سجل للجدول ==========
        function addRecord(bpm, status) {
            const now = new Date();
            const dateStr = now.toLocaleDateString('ar-EG');
            const timeStr = now.toLocaleTimeString('ar-EG');
            const result = (status === 'connected') ? 'طبيعي' : 'مفصول';
            const confidence = (status === 'connected') ? (bpm ? 'عالية' : 'متوسطة') : 'لا توجد';

            // إضافة للجدول
            const row = document.createElement('tr');
            row.innerHTML = `<td>${dateStr}</td><td>${timeStr}</td><td>${bpm || '--'}</td><td>${result}</td><td>${confidence}</td>`;
            if (tableBody.querySelector('.no-data')) tableBody.innerHTML = '';
            tableBody.prepend(row);
            if (tableBody.children.length > 50) tableBody.removeChild(tableBody.lastChild);

            // إضافة للسجل المحلي (للتصدير)
            localRecords.push({ date: dateStr, time: timeStr, bpm: bpm || 0, status: status });
            if (localRecords.length > 200) localRecords.shift();
        }

        // ========== تصدير CSV ==========
        function downloadCSV() {
            if (localRecords.length === 0) {
                alert('لا توجد بيانات لحفظها');
                return;
            }
            let csv = 'التاريخ,الوقت,النبض,الحالة\n';
            localRecords.forEach(rec => {
                csv += `${rec.date},${rec.time},${rec.bpm},${rec.status}\n`;
            });
            const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `heart_data_${new Date().toISOString().slice(0,10)}.csv`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        // ========== الاتصال بـ Firebase وتلقي البيانات ==========
        const patientRef = database.ref('/patient');

        patientRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                const ecg = data.ecg_value;
                const bpm = data.bpm;
                const status = data.status || (ecg ? 'connected' : 'disconnected');
                updateUI(ecg, bpm, status);
                connectionStatus.textContent = '✅ متصل بقاعدة البيانات';
            } else {
                connectionStatus.textContent = '⚠️ لا توجد بيانات حالياً من المستشعر';
            }
        }, (error) => {
            connectionStatus.textContent = '❌ خطأ في الاتصال بقاعدة البيانات';
            console.error(error);
        });

        // تحديث أولي
        resizeCanvas();
    </script>
</body>
</html>
