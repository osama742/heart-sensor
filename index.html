<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Heart Sensor — Remote Cardiac Monitor</title>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg-deep:#04070A;--bg-card:#080C11;--bg-elevated:#0C1119;
      --border:#131D2A;--border-active:#1B3A2A;
      --text-main:#E6EDF3;--text-dim:#7D8590;--text-faint:#484F58;
      --green:#2EA043;--green-glow:#3FB950;--red:#DA3633;--red-glow:#F85149;--orange:#D29922;--yellow:#E3B341;
      --font-mono:'IBM Plex Mono',monospace;--font-sans:'Inter',-apple-system,sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg-deep);color:var(--text-main);font-family:var(--font-sans);min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
    .header{display:flex;justify-content:space-between;align-items:center;padding:14px 28px;background:var(--bg-elevated);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;backdrop-filter:blur(16px)}
    .header-brand{display:flex;align-items:center;gap:10px;font-family:var(--font-mono);font-weight:700;font-size:17px;letter-spacing:1.5px;color:var(--green-glow)}
    .header-brand span{font-weight:400;font-size:11px;color:var(--text-dim);letter-spacing:1px}
    .header-status{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--text-dim);font-family:var(--font-mono)}
    .indicator{width:8px;height:8px;border-radius:50%;background:var(--green-glow);box-shadow:0 0 8px var(--green-glow);animation:pulse 2s infinite}
    .indicator.warn{background:var(--orange);box-shadow:0 0 8px var(--orange);animation:none}
    .indicator.danger{background:var(--red-glow);box-shadow:0 0 8px var(--red-glow);animation:blink .5s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
    .grid{display:grid;grid-template-columns:1.5fr 1fr;gap:16px;padding:20px 28px;max-width:1300px;width:100%;margin:0 auto;flex:1}
    @media(max-width:880px){.grid{grid-template-columns:1fr;padding:12px 14px}}
    .card{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:20px;transition:border-color .25s}
    .card:hover{border-color:#1F3140}
    .card.full{grid-column:1/-1}
    .card-label{font-family:var(--font-mono);font-size:10px;letter-spacing:2.5px;color:var(--text-faint);text-transform:uppercase;margin-bottom:14px;font-weight:600}
    .chart-wrap{height:310px;background:#010306;border-radius:10px;border:1px solid #0A1520;padding:2px;overflow:hidden}
    canvas{width:100%!important;height:100%!important}
    .bpm-block{text-align:center;padding:8px 0}
    .bpm-number{font-family:var(--font-mono);font-size:72px;font-weight:700;line-height:1;transition:color .4s;letter-spacing:-3px}
    .bpm-label{font-size:12px;color:var(--text-faint);margin-top:4px;letter-spacing:2px}
    .bpm-footer{font-size:11px;color:var(--text-faint);margin-top:10px;font-family:var(--font-mono)}
    .diag-badge{display:block;padding:10px 18px;border-radius:24px;font-weight:600;font-size:12px;letter-spacing:.5px;text-align:center;width:100%}
    .diag-notes{font-size:11px;color:var(--text-dim);margin-top:12px;line-height:1.7;background:#03060A;padding:12px;border-radius:8px;font-family:var(--font-mono);white-space:pre-line}
    .btn{display:block;width:100%;padding:11px 16px;border-radius:8px;font-weight:600;font-size:12px;letter-spacing:.8px;cursor:pointer;border:1px solid transparent;transition:all .15s;font-family:var(--font-sans);margin-top:10px;text-align:center}
    .btn-start{background:#0A1F12;color:var(--green-glow);border-color:#153520}
    .btn-start:hover{background:#0E2818}
    .btn-start.on{background:var(--green);color:#fff;border-color:var(--green);box-shadow:0 0 16px rgba(46,160,67,.35)}
    .btn-mute{background:#1A0A0A;color:var(--red);border-color:#2D1010;display:none}
    .btn-mute:hover{background:#240E0E}
    .btn-print{background:var(--bg-elevated);color:var(--text-dim);border-color:var(--border);font-weight:500}
    .btn-print:hover{background:#131A24}
    .table-scroll{max-height:180px;overflow-y:auto}
    table{width:100%;border-collapse:collapse;font-size:11px}
    th{padding:10px 8px;text-align:left;color:var(--text-faint);font-weight:600;font-size:10px;letter-spacing:1px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg-card);z-index:1}
    td{padding:10px 8px;border-bottom:1px solid #0A1118;color:var(--text-dim)}
    tr:hover td{background:rgba(255,255,255,.012)}
    .alarm-flash{animation:alarmPulse .55s infinite}
    @keyframes alarmPulse{0%,100%{box-shadow:inset 0 0 0px rgba(218,54,51,0)}50%{box-shadow:inset 0 0 100px rgba(218,54,51,.45)}}
    @media print{body{background:#fff;color:#000}.header,.btn,.bpm-block{display:none}.grid{display:block;padding:0}.card{border:1px solid #ccc;margin-bottom:10px;break-inside:avoid}.chart-wrap{height:240px}.card-label,.diag-notes{color:#333}}
  </style>
</head>
<body>
  <header class="header">
    <div class="header-brand">🫀 HEART SENSOR <span>| Clinical Monitor</span></div>
    <div class="header-status"><div class="indicator" id="led"></div><span id="ledText">Connecting…</span></div>
  </header>
  <main class="grid" id="dashboard">
    <div class="card full"><div class="card-label">ECG — Lead II · 25 mm/s</div><div class="chart-wrap"><canvas id="ecgCanvas"></canvas></div></div>
    <div class="card"><div class="card-label">Heart Rate</div><div class="bpm-block"><div class="bpm-number" id="bpmDisplay">---</div><div class="bpm-label">B P M</div></div><div class="bpm-footer" id="bpmMeta">Awaiting signal…</div></div>
    <div class="card"><div class="card-label">AI Diagnosis</div><div class="diag-badge" id="diagBadge" style="background:#10161C;color:var(--text-faint)">NO SIGNAL</div><div class="diag-notes" id="diagNotes">Waiting for stable ECG data…</div><button class="btn btn-start" id="btnMonitor" onclick="toggleMonitor()">▶ START MONITORING</button><button class="btn btn-mute" id="btnMute" onclick="toggleMute()">🔇 MUTE ALARM</button></div>
    <div class="card full"><div class="card-label">Patient History — Last 10 Records</div><div class="table-scroll"><table><thead><tr><th>Date</th><th>Time</th><th>BPM</th><th>Result</th><th>Conf.</th></tr></thead><tbody id="historyBody"><tr><td colspan="5" style="color:var(--text-faint)">Loading records…</td></tr></tbody></table></div><button class="btn btn-print" onclick="window.print()" style="margin-top:12px">🖨 PRINT ECG REPORT</button></div>
  </main>
  <script>
    (function(){
      firebase.initializeApp({
        apiKey:"AIzaSyCRDYiPRERG5ouSm1bXCYYkEQAnj3X15Ts",
        authDomain:"sensor-7042b.firebaseapp.com",
        databaseURL:"https://sensor-7042b-default-rtdb.europe-west1.firebasedatabase.app",
        projectId:"sensor-7042b"
      });
      const rtdb=firebase.database();
      const BUFFER=600,FS=5;
      let buf=[],monitoring=false,muted=false,audioCtx=null,smBpm=0,alarmT=null;
      const $=id=>document.getElementById(id);
      const led=$('led'),ledTxt=$('ledText'),bpmD=$('bpmDisplay'),bpmM=$('bpmMeta'),dBadge=$('diagBadge'),dNotes=$('diagNotes'),btnM=$('btnMonitor'),btnMu=$('btnMute'),hBody=$('historyBody'),dash=$('dashboard');
      const ctx=$('ecgCanvas').getContext('2d');
      const chart=new Chart(ctx,{
        type:'line',
        data:{labels:[],datasets:[{data:[],borderColor:'#3FB950',borderWidth:1.5,tension:0,pointRadius:0,fill:false}]},
        options:{
          responsive:true,maintainAspectRatio:false,animation:false,
          scales:{
            x:{display:true,grid:{color:'rgba(48,54,61,.3)'},ticks:{color:'#484F58',font:{size:9},maxTicksLimit:6}},
            y:{display:true,grid:{color:'rgba(48,54,61,.3)'},ticks:{color:'#484F58',font:{size:9}}}
          },
          plugins:{legend:{display:false}}
        }
      });

      function peaks(sig,fs){
        if(sig.length<fs*2) return [];
        const avg=sig.reduce((a,b)=>a+b,0)/sig.length;
        const thr=avg,minD=Math.floor(fs*.4);
        const p=[];
        for(let i=1;i<sig.length-1;i++){
          if(sig[i]<thr) continue;
          if(sig[i]<=sig[i-1]||sig[i]<=sig[i+1]) continue;
          if(p.length&&i-p[p.length-1]<minD) continue;
          p.push(i);
        }
        return p;
      }

      function bpm(sig,fs){
        const p=peaks(sig,fs);
        if(p.length<2) return 0;
        const rr=[];
        for(let i=1;i<p.length;i++) rr.push(p[i]-p[i-1]);
        const sec=rr.map(r=>r/fs);
        return Math.round(60/(sec.reduce((a,b)=>a+b,0)/sec.length));
      }

      rtdb.ref('/patient').on('value',snap=>{
        const d=snap.val();
        if(!d) return;
        const v=d.ecg_value??0,s=d.status??'disconnected';
        if(s==='ok'&&v!==0){
          led.className='indicator';ledTxt.textContent='Live';
        } else {
          led.className='indicator warn';ledTxt.textContent='Leads Off';
          if(monitoring) diag('NO_SIGNAL',0);
          return;
        }
        buf.push(v);
        if(buf.length>BUFFER) buf.shift();
        chart.data.datasets[0].data=[...buf];
        if(buf.length>10){
          const seg=buf.slice(-300);
          const min=Math.min(...seg),max=Math.max(...seg);
          const pad=Math.max((max-min)*.3,60);
          chart.options.scales.y.min=min-pad;
          chart.options.scales.y.max=max+pad;
        }
        chart.update('none');
        if(buf.length>=FS*2){
          const raw=bpm(buf.slice(-FS*3),FS);
          if(raw>25&&raw<250){
            smBpm=Math.round(smBpm*.55+raw*.45);
            bpmD.textContent=smBpm;
            if(smBpm>=60&&smBpm<=100) bpmD.style.color='var(--green-glow)';
            else if((smBpm>=50&&smBpm<60)||(smBpm>100&&smBpm<=120)) bpmD.style.color='var(--orange)';
            else bpmD.style.color='var(--red-glow)';
            if(monitoring) diag(null,smBpm);
          }
        }
        bpmM.textContent='Last: '+new Date().toLocaleTimeString();
      });

      function diag(ov,bp){
        let l,c,bg,n;
        if(ov==='NO_SIGNAL'){l='NO SIGNAL';c='var(--text-faint)';bg='#10161C';n='⚠ Sensor disconnected.\n→ Verify electrodes.\n→ Check AD8232.';alarm(true)}
        else if(bp>=60&&bp<=100){l='NORMAL SINUS RHYTHM';c='var(--green-glow)';bg='#0A1F12';n=`✓ Regular: ${bp} BPM.\n✓ P-waves upright.\n✓ QRS < 120 ms.`;alarm(false)}
        else if(bp>40&&bp<50){l='SINUS BRADYCARDIA';c='var(--orange)';bg='#1A1608';n=`⚠ ${bp} BPM — low.\n→ Check if symptomatic.`;alarm(true)}
        else if(bp>100&&bp<=120){l='SINUS TACHYCARDIA';c='var(--orange)';bg='#1A1608';n=`⚠ ${bp} BPM — elevated.\n→ Possible stress/fever.`;alarm(true)}
        else if(bp>120){l='⚠ ABNORMALITY';c='var(--red-glow)';bg='#1A0A0A';n=`⚠ Tachyarrhythmia.\n→ Irregular R-R.\n→ URGENT: ${bp} BPM.`;alarm(true)}
        else {l='ANALYZING…';c='var(--yellow)';bg='#1A1808';n='Gathering data…';alarm(false)}
        dBadge.textContent=l;dBadge.style.color=c;dBadge.style.background=bg;dNotes.textContent=n;
      }

      function alarm(on){
        dash.classList.toggle('alarm-flash',on);
        if(on&&!muted) beep();
        else if(!on){if(alarmT)clearTimeout(alarmT);if(audioCtx&&audioCtx.state==='running') audioCtx.suspend()}
      }

      function beep(){
        try{
          if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
          if(audioCtx.state==='suspended') audioCtx.resume();
          const o=audioCtx.createOscillator(),g=audioCtx.createGain();
          o.type='square';o.frequency.value=880;g.gain.value=.22;
          o.connect(g);g.connect(audioCtx.destination);
          o.start();setTimeout(()=>o.stop(),120);
          alarmT=setTimeout(()=>{if(dash.classList.contains('alarm-flash')) beep()},350);
        }catch(e){}
      }

      window.toggleMonitor=function(){
        monitoring=!monitoring;
        if(monitoring){btnM.textContent='⏸ STOP MONITORING';btnM.classList.add('on');btnMu.style.display='block';bpmM.textContent='Monitoring…'}
        else {btnM.textContent='▶ START MONITORING';btnM.classList.remove('on');btnMu.style.display='none';dash.classList.remove('alarm-flash');if(alarmT)clearTimeout(alarmT);if(audioCtx&&audioCtx.state==='running') audioCtx.suspend();bpmM.textContent='Paused'}
      };

      window.toggleMute=function(){
        muted=!muted;btnMu.textContent=muted?'🔊 UNMUTE':'🔇 MUTE ALARM';
        if(muted&&audioCtx&&audioCtx.state==='running') audioCtx.suspend();
      };

      rtdb.ref('/patient_history').on('value',snap=>{
        const d=snap.val();
        if(!d){hBody.innerHTML='<tr><td colspan="5" style="color:var(--text-faint)">No records</td></tr>';return}
        hBody.innerHTML=Object.values(d).reverse().slice(0,10).map(r=>`<tr><td>${r.date||'--'}</td><td>${r.time||'--'}</td><td>${r.bpm||'--'}</td><td>${r.result||'--'}</td><td>${r.confidence||'--'}</td></tr>`).join('');
      });
    })();
  </script>
</body>
</html>
