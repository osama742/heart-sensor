<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Heart Sensor — Remote Cardiac Monitor</title>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    /* ===== CSS Reset & Variables ===== */
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg-primary:#06080B;
      --bg-secondary:#0B0E13;
      --bg-card:#0D1117;
      --border-color:#1A2332;
      --border-glow:#1E3A2F;
      --text-primary:#E6EDF3;
      --text-secondary:#7D8590;
      --text-muted:#484F58;
      --accent-green:#2EA043;
      --accent-green-glow:#3FB950;
      --accent-red:#DA3633;
      --accent-orange:#D29922;
      --accent-yellow:#E3B341;
      --chart-line:#3FB950;
      --grid-color:rgba(48,54,61,0.4);
      --font-mono:'IBM Plex Mono',monospace;
      --font-sans:'Inter',-apple-system,sans-serif;
    }

    body{
      background:var(--bg-primary);
      color:var(--text-primary);
      font-family:var(--font-sans);
      min-height:100vh;
      display:flex;
      flex-direction:column;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }

    /* ===== Header ===== */
    .header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:14px 28px;
      background:var(--bg-secondary);
      border-bottom:1px solid var(--border-color);
      position:sticky;
      top:0;
      z-index:50;
      backdrop-filter:blur(12px);
    }
    .header-logo{
      display:flex;
      align-items:center;
      gap:10px;
      font-family:var(--font-mono);
      font-weight:700;
      font-size:18px;
      letter-spacing:2px;
      color:var(--accent-green-glow);
    }
    .header-logo span{color:var(--text-secondary);font-weight:400;font-size:13px}
    .header-status{
      display:flex;
      align-items:center;
      gap:8px;
      font-size:12px;
      color:var(--text-secondary);
    }
    .status-indicator{
      width:8px;height:8px;
      border-radius:50%;
      background:var(--accent-green-glow);
      box-shadow:0 0 8px var(--accent-green-glow);
      animation:statusPulse 2s infinite;
    }
    .status-indicator.warning{background:var(--accent-orange);box-shadow:0 0 8px var(--accent-orange);animation:none}
    @keyframes statusPulse{0%,100%{opacity:1}50%{opacity:0.4}}

    /* ===== Main Grid ===== */
    .main-grid{
      display:grid;
      grid-template-columns:1.6fr 1fr;
      gap:16px;
      padding:18px 28px;
      max-width:1280px;
      width:100%;
      margin:0 auto;
      flex:1;
    }
    @media(max-width:860px){
      .main-grid{grid-template-columns:1fr;padding:12px 14px}
    }

    /* ===== Cards ===== */
    .card{
      background:var(--bg-card);
      border:1px solid var(--border-color);
      border-radius:12px;
      padding:18px 20px;
      transition:border-color .2s;
    }
    .card:hover{border-color:#243040}
    .card.full-width{grid-column:1/-1}
    .card-header{
      font-family:var(--font-mono);
      font-size:10px;
      letter-spacing:2px;
      color:var(--text-muted);
      text-transform:uppercase;
      margin-bottom:14px;
      font-weight:600;
    }

    /* ===== Chart ===== */
    .chart-container{
      height:320px;
      background:#020408;
      border-radius:8px;
      padding:4px;
      border:1px solid #0F1A24;
    }
    canvas{width:100%!important;height:100%!important}

    /* ===== BPM ===== */
    .bpm-section{text-align:center;padding:8px 0}
    .bpm-value{
      font-family:var(--font-mono);
      font-size:68px;
      font-weight:700;
      line-height:1;
      transition:color .3s;
      letter-spacing:-2px;
    }
    .bpm-unit{font-size:13px;color:var(--text-muted);margin-top:4px;letter-spacing:1px}
    .bpm-sub{font-size:11px;color:var(--text-muted);margin-top:8px}

    /* ===== Diagnosis ===== */
    .diagnosis-badge{
      display:inline-block;
      padding:8px 16px;
      border-radius:20px;
      font-weight:600;
      font-size:12px;
      letter-spacing:0.5px;
      text-align:center;
      width:100%;
    }
    .diagnosis-detail{
      font-size:11px;
      color:var(--text-secondary);
      margin-top:10px;
      line-height:1.6;
      background:#060A0F;
      padding:10px;
      border-radius:6px;
    }

    /* ===== Buttons ===== */
    .btn{
      display:block;
      width:100%;
      padding:10px 16px;
      border-radius:6px;
      font-weight:600;
      font-size:12px;
      letter-spacing:0.8px;
      cursor:pointer;
      border:1px solid transparent;
      transition:all .15s ease;
      font-family:var(--font-sans);
      margin-top:10px;
      text-align:center;
    }
    .btn-primary{background:#0F2918;color:var(--accent-green-glow);border-color:#1B3D25}
    .btn-primary:hover{background:#162F20}
    .btn-primary.active{background:var(--accent-green);color:#fff;border-color:var(--accent-green);box-shadow:0 0 14px rgba(46,160,67,0.3)}
    .btn-danger{background:#1A0C0C;color:var(--accent-red);border-color:#2D1212}
    .btn-danger:hover{background:#241010}
    .btn-secondary{background:#0F1217;color:var(--text-secondary);border-color:var(--border-color)}
    .btn-secondary:hover{background:#161B22}

    /* ===== Table ===== */
    .table-wrap{max-height:180px;overflow-y:auto}
    table{width:100%;border-collapse:collapse;font-size:11px}
    th{padding:10px 8px;text-align:left;color:var(--text-muted);font-weight:600;font-size:10px;letter-spacing:1px;border-bottom:1px solid var(--border-color);position:sticky;top:0;background:var(--bg-card)}
    td{padding:10px 8px;border-bottom:1px solid #0F141A;color:var(--text-secondary)}
    tr:hover td{background:rgba(255,255,255,0.01)}

    /* ===== Alarm Animation ===== */
    .alarm-active{animation:alarmFlash .6s infinite}
    @keyframes alarmFlash{
      0%,100%{box-shadow:inset 0 0 0px rgba(218,54,51,0)}
      50%{box-shadow:inset 0 0 80px rgba(218,54,51,0.35)}
    }

    /* ===== Print ===== */
    @media print{
      body{background:#fff;color:#000}
      .header,.btn,.bpm-section{display:none}
      .main-grid{display:block;padding:0}
      .card{border:1px solid #ccc;margin-bottom:10px;break-inside:avoid}
      .chart-container{height:250px}
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-logo">
      🫀 HEART SENSOR <span>| Remote Monitor</span>
    </div>
    <div class="header-status">
      <div class="status-indicator" id="statusIndicator"></div>
      <span id="statusText">Connecting…</span>
    </div>
  </header>

  <!-- Main Dashboard -->
  <main class="main-grid" id="dashboard">
    <!-- ECG Chart -->
    <div class="card full-width">
      <div class="card-header">ECG — Lead II · 25 mm/s</div>
      <div class="chart-container"><canvas id="ecgCanvas"></canvas></div>
    </div>

    <!-- BPM -->
    <div class="card">
      <div class="card-header">Heart Rate</div>
      <div class="bpm-section">
        <div class="bpm-value" id="bpmDisplay">---</div>
        <div class="bpm-unit">BPM</div>
      </div>
      <div class="bpm-sub" id="bpmMeta">Awaiting signal…</div>
    </div>

    <!-- Diagnosis & AI -->
    <div class="card">
      <div class="card-header">AI Diagnosis</div>
      <div class="diagnosis-badge" id="diagBadge" style="background:#161B22;color:var(--text-muted)">NO SIGNAL</div>
      <div class="diagnosis-detail" id="diagDetail">Waiting for stable ECG data…</div>
      <button class="btn btn-primary" id="btnMonitor" onclick="toggleMonitoring()">▶ START MONITORING</button>
      <button class="btn btn-danger" id="btnMute" onclick="toggleMute()" style="display:none">🔇 MUTE ALARM</button>
    </div>

    <!-- History -->
    <div class="card full-width">
      <div class="card-header">Patient History — Last 10 Records</div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Date</th><th>Time</th><th>BPM</th><th>Result</th><th>Confidence</th></tr></thead>
          <tbody id="historyBody"><tr><td colspan="5" style="color:var(--text-muted)">Loading…</td></tr></tbody>
        </table>
      </div>
      <button class="btn btn-secondary" onclick="window.print()" style="margin-top:12px">🖨 PRINT ECG REPORT</button>
    </div>
  </main>

  <script>
    (function(){
      // ────────── Firebase Init ──────────
      firebase.initializeApp({
        apiKey:"AIzaSyCRDYiPRERG5ouSm1bXCYYkEQAnj3X15Ts",
        authDomain:"sensor-7042b.firebaseapp.com",
        databaseURL:"https://sensor-7042b-default-rtdb.europe-west1.firebasedatabase.app",
        projectId:"sensor-7042b"
      });
      const rtdb = firebase.database();

      // ────────── State ──────────
      const MAX_POINTS = 500;
      let ecgData = [];
      let isMonitoring = false;
      let isMuted = false;
      let lastBPM = 0;
      let audioCtx = null;
      let smoothedBPM = 0;

      // ────────── DOM Refs ──────────
      const $ = id => document.getElementById(id);
      const statusIndicator = $('statusIndicator');
      const statusText = $('statusText');
      const bpmDisplay = $('bpmDisplay');
      const bpmMeta = $('bpmMeta');
      const diagBadge = $('diagBadge');
      const diagDetail = $('diagDetail');
      const btnMonitor = $('btnMonitor');
      const btnMute = $('btnMute');
      const historyBody = $('historyBody');
      const dashboard = $('dashboard');

      // ────────── Chart.js ──────────
      const ctx = $('ecgCanvas').getContext('2d');
      const chart = new Chart(ctx,{
        type:'line',
        data:{
          labels:[],
          datasets:[{
            data:[],
            borderColor:'#3FB950',
            borderWidth:1.6,
            tension:0,
            pointRadius:0,
            fill:false
          }]
        },
        options:{
          responsive:true,
          maintainAspectRatio:false,
          animation:false,
          scales:{
            x:{
              display:true,
              grid:{color:rgba(48,54,61,0.35)},
              ticks:{color:'#484F58',font:{size:9},maxTicksLimit:6}
            },
            y:{
              display:true,
              grid:{color:rgba(48,54,61,0.35)},
              ticks:{color:'#484F58',font:{size:9}}
            }
          },
          plugins:{legend:{display:false}}
        }
      });

      // ────────── Real‑time Listener ──────────
      rtdb.ref('/patient').on('value',snap=>{
        const data = snap.val();
        if(!data) return;

        const ecgValue = data.ecg_value ?? 0;
        const sensorStatus = data.status ?? 'disconnected';

        // Update connection UI
        if(sensorStatus==='ok' && ecgValue!==0){
          statusIndicator.className='status-indicator';
          statusText.textContent='Live — Patient Connected';
        } else {
          statusIndicator.className='status-indicator warning';
          statusText.textContent='Leads Off / No Signal';
          if(isMonitoring) updateDiagnosis('NO_SIGNAL',0);
          return;
        }

        // Push to buffer
        ecgData.push(ecgValue);
        if(ecgData.length>MAX_POINTS) ecgData.shift();

        // Update chart
        chart.data.datasets[0].data = [...ecgData];

        // Auto‑scale Y axis
        if(ecgData.length>10){
          const segment = ecgData.slice(-200);
          const min = Math.min(...segment);
          const max = Math.max(...segment);
          const padding = Math.max((max-min)*0.25, 80);
          chart.options.scales.y.min = min - padding;
          chart.options.scales.y.max = max + padding;
        }
        chart.update('none');

        // ── BPM Calculation (2‑second auto‑threshold) ──
        if(ecgData.length>=10){
          const window = ecgData.slice(-10); // 2 sec @ 5 Hz
          const wMin = Math.min(...window);
          const wMax = Math.max(...window);
          const threshold = wMin + (wMax - wMin) * 0.5;

          let peaks = 0;
          for(let i=1;i<window.length;i++){
            if(window[i-1] < threshold && window[i] >= threshold) peaks++;
          }

          const rawBPM = Math.round(peaks * 30); // 2 sec → 60 sec

          if(rawBPM > 25 && rawBPM < 220){
            // Exponential smoothing
            smoothedBPM = Math.round(smoothedBPM * 0.6 + rawBPM * 0.4);
            lastBPM = smoothedBPM;
            renderBPM(smoothedBPM);
            if(isMonitoring) updateDiagnosis(null,smoothedBPM);
          }
        }

        bpmMeta.textContent = `Updated: ${new Date().toLocaleTimeString()}`;
      });

      // ────────── Render BPM ──────────
      function renderBPM(bpm){
        bpmDisplay.textContent = bpm;
        if(bpm>=60 && bpm<=100) bpmDisplay.style.color = '#3FB950';
        else if((bpm>=50 && bpm<60)||(bpm>100 && bpm<=120)) bpmDisplay.style.color = '#D29922';
        else bpmDisplay.style.color = '#DA3633';
      }

      // ────────── AI Diagnosis Engine ──────────
      function updateDiagnosis(override,bpm){
        let label='',color='',bg='',detail='',conf='';

        if(override==='NO_SIGNAL'){
          label='NO SIGNAL'; color='#7D8590'; bg='#161B22';
          detail='⚠ Sensor disconnected or leads off.\n→ Check electrode placement.\n→ Ensure AD8232 is powered.';
          conf='0%';
          triggerAlarm(true);
        } else if(bpm>=60 && bpm<=100){
          label='NORMAL SINUS RHYTHM'; color='#3FB950'; bg='#0F2918';
          detail=`✓ Regular sinus rhythm at ${bpm} BPM.\n✓ P‑waves present and upright.\n✓ QRS duration < 120 ms.\n✓ No ectopy detected.`;
          conf='96%';
          triggerAlarm(false);
        } else if(bpm>40 && bpm<50){
          label='SINUS BRADYCARDIA'; color='#D29922'; bg='#1F1A0A';
          detail=`⚠ Heart rate below normal: ${bpm} BPM.\n→ May be normal in athletes.\n→ Monitor for dizziness/fatigue.`;
          conf='84%';
          triggerAlarm(true);
        } else if(bpm>100 && bpm<=120){
          label='SINUS TACHYCARDIA'; color='#D29922'; bg='#1F1A0A';
          detail=`⚠ Elevated rate: ${bpm} BPM.\n→ Possible stress, pain, or fever.\n→ Evaluate underlying cause.`;
          conf='87%';
          triggerAlarm(true);
        } else if(bpm>120){
          label='⚠ ABNORMALITY DETECTED'; color='#DA3633'; bg='#1F0A0A';
          detail=`⚠ Tachyarrhythmia suspected.\n→ Irregular R‑R intervals.\n→ Urgent medical evaluation advised.\n→ Rate: ${bpm} BPM.`;
          conf='92%';
          triggerAlarm(true);
        } else {
          label='ANALYZING…'; color='#E3B341'; bg='#1A1A0A';
          detail='Gathering additional data for accurate diagnosis…';
          conf='--';
          triggerAlarm(false);
        }

        diagBadge.textContent = label;
        diagBadge.style.color = color;
        diagBadge.style.background = bg;
        diagDetail.textContent = detail;
      }

      // ────────── Alarm System ──────────
      function triggerAlarm(active){
        dashboard.classList.toggle('alarm-active', active);
        if(active && !isMuted) playAlarmBeep();
        else stopAlarm();
      }

      function playAlarmBeep(){
        try{
          if(!audioCtx) audioCtx = new(window.AudioContext||window.webkitAudioContext)();
          if(audioCtx.state==='suspended') audioCtx.resume();
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.type = 'square';
          osc.frequency.value = 880;
          gain.gain.value = 0.2;
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          osc.start();
          setTimeout(()=>osc.stop(),120);
          setTimeout(()=>{if(dashboard.classList.contains('alarm-active')) playAlarmBeep();},350);
        }catch(e){/* user gesture required sometimes */}
      }

      function stopAlarm(){
        if(audioCtx && audioCtx.state==='running') audioCtx.suspend();
      }

      // ────────── Controls ──────────
      window.toggleMonitoring = function(){
        isMonitoring = !isMonitoring;
        if(isMonitoring){
          btnMonitor.textContent = '⏸ STOP MONITORING';
          btnMonitor.classList.add('active');
          btnMute.style.display = 'block';
          bpmMeta.textContent = 'Monitoring active…';
        } else {
          btnMonitor.textContent = '▶ START MONITORING';
          btnMonitor.classList.remove('active');
          btnMute.style.display = 'none';
          dashboard.classList.remove('alarm-active');
          stopAlarm();
          bpmMeta.textContent = 'Monitoring paused';
        }
      };

      window.toggleMute = function(){
        isMuted = !isMuted;
        btnMute.textContent = isMuted ? '🔊 UNMUTE' : '🔇 MUTE ALARM';
        if(isMuted) stopAlarm();
      };

      // ────────── History Table ──────────
      rtdb.ref('/patient_history').on('value',snap=>{
        const data = snap.val();
        if(!data){
          historyBody.innerHTML = '<tr><td colspan="5" style="color:#484F58">No historical records found.</td></tr>';
          return;
        }
        const records = Object.values(data).reverse().slice(0,10);
        historyBody.innerHTML = records.map(r=>`
          <tr>
            <td>${r.date||'--'}</td>
            <td>${r.time||'--'}</td>
            <td>${r.bpm||'--'}</td>
            <td>${r.result||'--'}</td>
            <td>${r.confidence||'--'}</td>
          </tr>
        `).join('');
      });

    })();
  </script>
</body>
</html>
