<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Heart Sensor - Medical Monitor</title>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',system-ui,sans-serif}
    body{background:#060606;color:#e0e0e0;min-height:100vh;display:flex;flex-direction:column;align-items:center}
    .header{width:100%;background:#0c0c0c;border-bottom:1px solid #1a2a1a;padding:12px 24px;display:flex;justify-content:space-between;align-items:center}
    .header h1{color:#00ff44;font-size:22px;letter-spacing:3px;text-shadow:0 0 10px rgba(0,255,68,0.3)}
    .status-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:8px;background:#00ff44;box-shadow:0 0 8px #00ff44}
    .conn-text{color:#aaa;font-size:13px}
    .container{width:95%;max-width:960px;margin:16px auto;display:grid;grid-template-columns:1.2fr 0.8fr;gap:14px}
    @media(max-width:700px){.container{grid-template-columns:1fr}}
    .card{background:#0c0c0c;border:1px solid #1a2a1a;border-radius:10px;padding:16px}
    .full{grid-column:1/-1}
    .chart-wrap{height:300px;background:#050505;border:1px solid #0f2a0f;border-radius:8px;padding:6px}
    canvas{width:100%!important;height:100%!important}
    .bpm-box{text-align:center;padding:24px 16px}
    .bpm-title{font-size:11px;color:#4a6a4a;letter-spacing:3px;margin-bottom:6px;text-transform:uppercase;font-weight:600}
    .bpm-num{font-size:60px;font-weight:700;transition:color .3s;line-height:1}
    .bpm-unit{font-size:13px;color:#555;margin-top:6px;letter-spacing:1px}
    .diag-badge{padding:10px 18px;border-radius:20px;font-weight:700;text-align:center;margin-top:12px;font-size:13px;letter-spacing:0.5px}
    .diag-conf{font-size:11px;color:#666;margin-top:8px;text-align:center}
    .btn{background:#0f1a0f;color:#00ff44;border:1px solid #1a3a1a;padding:10px 18px;border-radius:6px;cursor:pointer;font-size:13px;width:100%;margin-top:10px;transition:all .2s;font-weight:600;letter-spacing:1px}
    .btn:hover{background:#1a2a1a}
    .btn.on{background:#00ff44;color:#050505;border-color:#00ff44;box-shadow:0 0 12px rgba(0,255,68,0.4)}
    .btn.mute{background:#1a0a0a;color:#ff4444;border-color:#3a0a0a}
    .btn.mute:hover{background:#2a0a0a}
    table{width:100%;border-collapse:collapse;font-size:12px}
    th,td{padding:10px 8px;text-align:left;border-bottom:1px solid #151515}
    th{color:#4a6a4a;font-weight:600;font-size:11px;letter-spacing:1px}
    .alarm-border{animation:alarmPulse .5s infinite}
    @keyframes alarmPulse{0%,100%{box-shadow:inset 0 0 60px rgba(255,0,0,0.3)}50%{box-shadow:inset 0 0 120px rgba(255,0,0,0.6)}}
    #aiPanel{margin-top:8px;padding:10px;border-radius:6px;font-size:12px;line-height:1.6}
  </style>
</head>
<body>
  <div class="header">
    <h1>🫀 HEART SENSOR</h1>
    <div><span class="status-dot" id="statusDot"></span><span class="conn-text" id="connStatus">Searching...</span></div>
  </div>
  <div class="container">
    <div class="card full chart-wrap"><canvas id="ecgChart"></canvas></div>
    <div class="card bpm-box">
      <div class="bpm-title">Heart Rate</div>
      <div class="bpm-num" id="bpmValue">---</div>
      <div class="bpm-unit">BPM</div>
      <div id="bpmInfo" style="font-size:11px;color:#555;margin-top:6px">Awaiting signal...</div>
    </div>
    <div class="card">
      <div class="bpm-title" style="margin-bottom:12px">AI Diagnosis</div>
      <div class="diag-badge" id="diagBadge" style="background:#151515;color:#888">NO SIGNAL</div>
      <div class="diag-conf" id="diagConf">Confidence: --%</div>
      <div id="aiPanel" style="background:#0a0a0a;color:#666">Waiting for stable ECG data...</div>
      <button class="btn" id="btnMonitor" onclick="toggleMonitoring()">▶ START MONITORING</button>
      <button class="btn mute" id="btnMute" onclick="toggleMute()" style="display:none">🔇 MUTE ALARM</button>
    </div>
    <div class="card full">
      <div class="bpm-title" style="margin-bottom:10px">Patient History</div>
      <div style="max-height:160px;overflow-y:auto">
        <table><thead><tr><th>Date</th><th>Time</th><th>BPM</th><th>Result</th><th>Conf.</th></tr></thead><tbody id="historyBody"><tr><td colspan="5" style="color:#444">Loading records...</td></tr></tbody></table>
      </div>
      <button class="btn" onclick="window.print()" style="margin-top:12px">🖨 PRINT ECG STRIP</button>
    </div>
  </div>

  <script>
    // Firebase
    firebase.initializeApp({
      apiKey:"AIzaSyCRDYiPRERG5ouSm1bXCYYkEQAnj3X15Ts",
      authDomain:"sensor-7042b.firebaseapp.com",
      databaseURL:"https://sensor-7042b-default-rtdb.europe-west1.firebasedatabase.app",
      projectId:"sensor-7042b"
    });
    const db = firebase.database();

    // State
    let ecgBuffer = [], monitoring = false, muted = false, audioCtx = null, lastBpm = 0, peakTimes = [];

    // Chart
    const ctx = document.getElementById('ecgChart').getContext('2d');
    const chart = new Chart(ctx, {
      type:'line',
      data:{labels:[],datasets:[{data:[],borderColor:'#00ff44',borderWidth:1.8,tension:0,pointRadius:0,fill:false}]},
      options:{
        responsive:true,maintainAspectRatio:false,animation:false,
        scales:{
          x:{display:true,grid:{color:'#0a1a0a'},ticks:{color:'#3a5a3a',font:{size:9},maxTicksLimit:6}},
          y:{display:true,grid:{color:'#0a1a0a'},ticks:{color:'#3a5a3a',font:{size:9}}}
        },
        plugins:{legend:{display:false}}
      }
    });

    // Real-time data
    db.ref('/patient').on('value', snap => {
      const d = snap.val();
      if(!d) return;
      document.getElementById('connStatus').textContent = 'Live';
      document.getElementById('statusDot').style.background = '#00ff44';
      
      const val = d.ecg_value ?? 0, status = d.status ?? 'disconnected';
      if(status==='disconnected'||val===0) {
        document.getElementById('statusDot').style.background = '#ff8800';
        document.getElementById('connStatus').textContent = 'Leads Off';
        if(monitoring) triggerDiagnosis('NO SIGNAL',0);
        return;
      }

      ecgBuffer.push(val);
      if(ecgBuffer.length>500) ecgBuffer.shift();
      chart.data.datasets[0].data = ecgBuffer;
      if(ecgBuffer.length>10) {
        let seg = ecgBuffer.slice(-200);
        let min = Math.min(...seg), max = Math.max(...seg);
        let pad = (max-min)*0.2||60;
        chart.options.scales.y.min = min-pad;
        chart.options.scales.y.max = max+pad;
      }
      chart.update('none');

      // BPM (auto-threshold, 2 sec)
      if(ecgBuffer.length>=10) {
        let seg = ecgBuffer.slice(-10);
        let min = Math.min(...seg), max = Math.max(...seg);
        let thr = min + (max-min)*0.5, peaks = 0;
        for(let i=1;i<seg.length;i++) if(seg[i-1]<thr && seg[i]>=thr) peaks++;
        let newBpm = Math.round(peaks*30);
        if(newBpm>25 && newBpm<220) {
          lastBpm = Math.round(lastBpm*0.7 + newBpm*0.3);
          updateBPM(lastBpm);
          if(monitoring) triggerDiagnosis(null,lastBpm);
        }
      }
      document.getElementById('bpmInfo').textContent = 'Updated: '+new Date().toLocaleTimeString();
    });

    function updateBPM(bpm) {
      const el = document.getElementById('bpmValue');
      el.textContent = bpm;
      if(bpm>=60&&bpm<=100) el.style.color = '#00ff44';
      else if((bpm>=50&&bpm<60)||(bpm>100&&bpm<=120)) el.style.color = '#ff8800';
      else el.style.color = '#ff3333';
    }

    function triggerDiagnosis(override, bpm) {
      const badge = document.getElementById('diagBadge'), conf = document.getElementById('diagConf'), ai = document.getElementById('aiPanel');
      if(override==='NO SIGNAL') {
        badge.textContent='NO SIGNAL'; badge.style.background='#151515'; badge.style.color='#888';
        conf.textContent='Confidence: 0%'; ai.innerHTML='<span style="color:#888">Sensor disconnected or leads off. Check electrodes.</span>';
        alarm(true);
      } else if(bpm>=60 && bpm<=100) {
        badge.textContent='NORMAL SINUS RHYTHM'; badge.style.background='#0a2a0a'; badge.style.color='#00ff44';
        conf.textContent='Confidence: 94%'; ai.innerHTML='<span style="color:#00ff44">✓ Regular rhythm. Rate: '+bpm+' BPM.<br>✓ P-waves present.<br>✓ QRS duration normal.</span>';
        alarm(false);
      } else if(bpm>40 && bpm<50) {
        badge.textContent='SINUS BRADYCARDIA'; badge.style.background='#2a1a00'; badge.style.color='#ff8800';
        conf.textContent='Confidence: 82%'; ai.innerHTML='<span style="color:#ff8800">⚠ Heart rate below normal range.<br>Monitor for symptoms.</span>';
        alarm(true);
      } else if(bpm>100 && bpm<=120) {
        badge.textContent='SINUS TACHYCARDIA'; badge.style.background='#2a1a00'; badge.style.color='#ff8800';
        conf.textContent='Confidence: 85%'; ai.innerHTML='<span style="color:#ff8800">⚠ Elevated heart rate detected.<br>Possible stress or exertion.</span>';
        alarm(true);
      } else if(bpm>120) {
        badge.textContent='ABNORMALITY DETECTED'; badge.style.background='#2a0000'; badge.style.color='#ff0000';
        conf.textContent='Confidence: 91%'; ai.innerHTML='<span style="color:#ff0000">⚠ Tachyarrhythmia suspected.<br>⚠ Irregular intervals.<br>Medical attention advised.</span>';
        alarm(true);
      } else {
        badge.textContent='ANALYZING...'; badge.style.background='#1a1a0a'; badge.style.color='#ffcc00';
        conf.textContent='Confidence: --%'; ai.innerHTML='<span style="color:#ffcc00">Gathering more data for accurate analysis...</span>';
        alarm(false);
      }
    }

    function alarm(on) {
      document.body.classList.toggle('alarm-border', on);
      if(on && !muted) startBeep(); else stopBeep();
    }

    function startBeep() {
      try {
        if(!audioCtx) audioCtx = new(window.AudioContext||window.webkitAudioContext)();
        if(audioCtx.state==='suspended') audioCtx.resume();
        const o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.type='square'; o.frequency.value=800; g.gain.value=0.25;
        o.connect(g); g.connect(audioCtx.destination);
        o.start(); setTimeout(()=>o.stop(),100);
        setTimeout(()=>{if(document.body.classList.contains('alarm-border')) startBeep()},333);
      } catch(e){}
    }

    function stopBeep() { if(audioCtx) audioCtx.suspend(); }

    function toggleMonitoring() {
      monitoring=!monitoring;
      const btn=document.getElementById('btnMonitor'), muteBtn=document.getElementById('btnMute');
      if(monitoring) {
        btn.textContent='⏸ STOP MONITORING'; btn.classList.add('on');
        muteBtn.style.display='block';
        document.getElementById('bpmInfo').textContent='Monitoring active...';
      } else {
        btn.textContent='▶ START MONITORING'; btn.classList.remove('on');
        muteBtn.style.display='none';
        document.body.classList.remove('alarm-border'); stopBeep();
        document.getElementById('bpmInfo').textContent='Monitoring stopped';
      }
    }

    function toggleMute() {
      muted=!muted;
      document.getElementById('btnMute').textContent = muted?'🔊 UNMUTE':'🔇 MUTE ALARM';
      if(muted) stopBeep();
    }

    // History
    db.ref('/patient_history').on('value', snap => {
      const data = snap.val(), tbody = document.getElementById('historyBody');
      if(!data) { tbody.innerHTML='<tr><td colspan="5" style="color:#444">No records yet</td></tr>'; return; }
      tbody.innerHTML = Object.values(data).reverse().slice(0,10).map(r =>
        `<tr><td>${r.date||'-'}</td><td>${r.time||'-'}</td><td>${r.bpm||'-'}</td><td>${r.result||'-'}</td><td>${r.confidence||'-'}</td></tr>`
      ).join('');
    });
  </script>
</body>
</html>
